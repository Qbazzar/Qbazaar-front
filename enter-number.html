<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Q Bazaar — Verify Your Identity</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/auth.css?v=3">
</head>
<body>
<header class="qb-ahead">
  <a href="index.html"><img src="assets/logo.svg" alt="Q Bazaar"></a>
  <button type="button" class="qb-lang"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="5" width="18" height="14" rx="2"/></svg>EN <span style="color:#c2c2c2">▾</span></button>
</header>
<main>
  <div class="qb-card">
    <h1>Verify Your Identity</h1>
    <p class="qb-sub">For your security, we need to confirm that this phone number belongs<br>to you before continuing.</p>

    <form action="enter-code.html" method="get">
      <div class="qb-phone" style="margin-top:26px">
        <div class="qb-field cc">
          <label>Code Country</label>
          <select>
            <option>Qatar +974</option><option>Jordan +962</option><option>Oman +968</option><option>Germany +49</option><option>Palestine +970</option>
          </select>
        </div>
        <div class="qb-field num">
          <label>Phone number</label>
          <input type="tel" placeholder="5551 2345" required>
        </div>
      </div>
      <p class="qb-note sm">You will then receive a text message containing a verification code on the number provided.</p>
      <button type="submit" class="qb-btn">Send</button>
    </form>
  </div>
</main>
<script src="assets/typo.js?v=5"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Q Bazaar — Change Password</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/auth.css?v=1">
</head>
<body>
<header class="qb-ahead">
  <a href="index.html"><img src="assets/qb-logo.png" alt="Q Bazaar"></a>
  <button type="button" class="qb-lang"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="5" width="18" height="14" rx="2"/></svg>EN <span style="color:#c2c2c2">▾</span></button>
</header>
<main>
  <div class="qb-card">
    <h1 class="center">Change Password</h1>
    <p class="qb-sub">Enter your current password, then choose a new password to<br>secure your account.</p>
    <form action="login.html" method="get">
      <div class="qb-field" style="margin-top:22px">
        <label>New Password <b>*</b></label>
        <div class="qb-inwrap">
          <input type="password" id="pw1" placeholder="********" required>
          <button type="button" class="qb-eye" data-eye="pw1"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/><path d="M4 4l16 16"/></svg></button>
        </div>
      </div>
      <div class="qb-field">
        <label>Confirm Password <b>*</b></label>
        <div class="qb-inwrap">
          <input type="password" id="pw2" placeholder="********" required>
          <button type="button" class="qb-eye" data-eye="pw2"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/><path d="M4 4l16 16"/></svg></button>
        </div>
      </div>
      <button type="submit" class="qb-btn">Change Password</button>
    </form>
  </div>
</main>
<script src="assets/auth.js?v=1"></script>
</body>
</html>
